services:
  postgres:
    image: postgres:15-alpine
    container_name: officespace_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: officeuser
      POSTGRES_PASSWORD: officepass
      POSTGRES_DB: officespace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./shared-infra/init-db.sql:/docker-entrypoint-initdb.d/init.sql

  adminer:
    image: adminer
    container_name: officespace_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data: